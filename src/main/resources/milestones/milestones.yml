menus:
  overview:
    rows: 4
    title: "<gradient:#30bbf1:#275ced><bold>Milestones</bold></gradient>"
  category:
    rows: 4
    title: "<gradient:#30bbf1:#275ced><bold>{category}</bold></gradient>"
  track:
    rows: 4
    title: "<gradient:#30bbf1:#275ced><bold>{category}</bold></gradient>"

notifications:
  completion:
    enabled: true
    player-message:
      enabled: true
      lines:
        - "<green>Milestone completed: <yellow>{milestone}</yellow>"
        - "<gray>{rewards}"
    sound: "entity.player.levelup"
    broadcast:
      enabled: true
      minimum-target: 100000
      lines:
        - "<gold>{player}</gold> <gray>completed <yellow>{milestone}</yellow><gray>."
      sound: "ui.toast.challenge_complete"

categories:
  mining:
    name: "Mining"
    icon: DIAMOND_PICKAXE
    enabled: true
  ranks:
    name: "Ranks"
    icon: NETHER_STAR
    enabled: false
  progression:
    name: "Progression"
    icon: EXPERIENCE_BOTTLE
    enabled: false
  cells:
    name: "Cells"
    icon: OAK_DOOR
    enabled: false
  auctions:
    name: "Auctions"
    icon: CHEST
    enabled: false

